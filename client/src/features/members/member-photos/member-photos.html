<h2 class="card-title text-3xl text-primary">Photos</h2>
<div class="divider"></div>
@if (photos$ | async; as photos) {
  @if (photos.length > 0) {
    <div class="grid grid-cols-4 auto-rows-min gap-3 p-5 h-[65vh] overflow-auto">
      @for (photo of photos; track photo.id) {
        <img src="{{photo.url}}" alt="Photo" class="object-cover w-full h-full rounded-lg">
      }
    </div>

  }
}
