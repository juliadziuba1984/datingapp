<h2 class="card-title text-3xl text-primary">Profile</h2>
<div class="divider"></div>
@if (member(); as member) {
  <div class="flex flex-col gap-3">
    <div>Member since: {{ member.created | date }}</div>
    <div>Last active: {{ member.lastActive | date: 'dd MMM yyy - h:mm a' }}</div>
    <h3 class="text-lg">About {{ member.displayName }}</h3>
    <p>{{ member.description }}</p>
  </div>
}
