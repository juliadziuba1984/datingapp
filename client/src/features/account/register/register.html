<div class="card bg-base-100 w-1/2 mx-auto flex flex-col p-6 rounded-lg shadow-lg">
  <div class="card-title justify-center text-3xl text-primary">Sign up</div>
  <div class="card-body w-full">
    <form #registerForm="ngForm" (ngSubmit)="register()" class="flex flex-col gap-4 w-full">
      <input
        type="text"
        name="email"
        class="input w-full"
        [(ngModel)]="creds.email"
        placeholder="Email"
      />
      <input
        type="text"
        name="displayName"
        class="input w-full"
        [(ngModel)]="creds.displayName"
        placeholder="Name"
      />
      <input
        type="password"
        name="password"
        class="input w-full"
        [(ngModel)]="creds.password"
        placeholder="Password"
      />
    </form>
    <div class="flex items-center justify-end gap-3">
        <button type="button" class="btn" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn btn-primary" (click)="register()">Register</button>
    </div>
  </div>
</div>
